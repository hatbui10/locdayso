<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lọc số đa năng</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  margin: 0;
  padding: 20px;
  color: #fff;
}

.container {
  max-width: 600px;
  margin: auto;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h2 {
  text-align: center;
}

input, button, textarea {
  width: 90%;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  padding: 10px;
  font-size: 14px;
}

input[type="text"] {
  text-align: center;
  font-size: 18px;
}

button {
  background: #fff;
  color: #333;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

textarea {
  height: 250px;
  resize: none;
}

</style>
</head>

<body>

<div class="container">
  <h2>🔢 Lọc số từ mọi loại file</h2>

  <input type="file" id="fileInput">

  <label>Nhập số bắt đầu:</label>
  <input type="text" id="filterInput" value="3">

  <button onclick="processFile()">🔍 Lọc số</button>
  <button onclick="copyResult()">📋 Copy</button>
  <button onclick="downloadFile()">⬇️ Xuất file</button>

  <textarea id="output" placeholder="Kết quả sẽ hiển thị ở đây..."></textarea>
</div>

<script>
let finalText = "";

function processFile() {
  const file = document.getElementById("fileInput").files[0];
  const filterValue = document.getElementById("filterInput").value;

  if (!file) {
    alert("Chưa chọn file 😐");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(event) {
    const text = event.target.result;

    // Lấy tất cả số trong file
    const numbers = text.match(/\\d+/g) || [];

    // Lọc theo số nhập
    const filtered = numbers.filter(num => num.startsWith(filterValue));

    // Chia 5 số mỗi dòng
    let lines = [];
    for (let i = 0; i < filtered.length; i += 5) {
      lines.push(filtered.slice(i, i + 5).join(", "));
    }

    finalText = lines.join("\\n");
    document.getElementById("output").value = finalText;
  };

  reader.readAsText(file);
}

function copyResult() {
  const text = document.getElementById("output");
  text.select();
  document.execCommand("copy");
  alert("Đã copy 😎");
}

function downloadFile() {
  const blob = new Blob([finalText], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ketqua.txt";
  a.click();
}
</script>

</body>
</html>
