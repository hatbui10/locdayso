<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Dynamic Slot Matrix</title>

<style>
body {
  background: #111;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  margin-top: 30px;
}

.controls {
  margin-bottom: 20px;
}

.grid {
  display: grid;
  gap: 15px;
  justify-content: center;
  margin-bottom: 30px;
}

.wheel {
  width: 50px;
  height: 60px;
  overflow: hidden;
  border-radius: 8px;
  background: #1e1e1e;
  border: 1px solid #333;
  box-shadow: 0 2px 6px rgba(0,0,0,0.5);
}

.number {
  height: 60px;
  line-height: 60px;
  font-size: 24px;
  color: #ffffff;
}

.number {
  height: 60px;
  line-height: 60px;
  font-size: 24px;
}

.highlight {
  color: #00ffcc;
  font-weight: bold;
  text-shadow: 0 0 8px #00ffcc;
}

input {
  width: 60px;
  padding: 5px;
  margin: 0 5px;
}

button {
  padding: 6px 15px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>Slot Matrix Tùy Chỉnh</h2>

<div class="controls">
  Hàng: <input type="number" id="rows" value="10" min="1">
  Cột: <input type="number" id="cols" value="10" min="1">
  <button onclick="createGrid()">Tạo Lưới</button>
  <button onclick="spinAll()">Random</button>
</div>

<div class="grid" id="grid"></div>

<script>
const grid = document.getElementById("grid");

function createGrid() {
  const rows = parseInt(document.getElementById("rows").value);
  const cols = parseInt(document.getElementById("cols").value);

  grid.innerHTML = "";
  grid.style.gridTemplateColumns = `repeat(${cols}, 50px)`;

  for (let i = 0; i < rows * cols; i++) {
    const wheel = document.createElement("div");
    wheel.className = "wheel";

    const numbers = document.createElement("div");
    numbers.className = "numbers";

    for (let r = 0; r < 6; r++) {
      for (let n = 0; n <= 9; n++) {
        const div = document.createElement("div");
        div.className = "number";
        div.innerText = n;
        numbers.appendChild(div);
      }
    }

    wheel.appendChild(numbers);
    grid.appendChild(wheel);
  }
}

function spinAll() {
  const wheels = document.querySelectorAll(".numbers");

  wheels.forEach((wheel, index) => {

    wheel.querySelectorAll(".number").forEach(n => {
      n.classList.remove("highlight");
    });

    const randomNumber = Math.floor(Math.random() * 10);
    const baseRounds = 50;
    const offset = (baseRounds + randomNumber) * 60;

    wheel.style.transition = "none";
    wheel.style.transform = "translateY(0px)";

    setTimeout(() => {
      wheel.style.transition = "transform 1.6s cubic-bezier(0.2,0.8,0.2,1)";
      wheel.style.transform = `translateY(-${offset}px)`;
    }, 20 + index * 3);

    setTimeout(() => {
      const numbers = wheel.querySelectorAll(".number");
      numbers[baseRounds + randomNumber].classList.add("highlight");
    }, 1600 + index * 3);
  });
}

// Tạo mặc định khi load trang
createGrid();
</script>

</body>
</html>
