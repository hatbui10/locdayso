<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phân Tích Số Q - Tô Màu Nền</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 1000px; margin: 20px auto; padding: 20px; background: #f0f2f5; }
        .box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn-group { display: flex; gap: 10px; margin: 20px 0; }
        button { flex: 1; padding: 14px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-run { background: #007bff; color: white; }
        .btn-down { background: #28a745; color: white; display: none; }
        
        #output { 
            margin-top: 20px; 
            background: #ffffff; 
            padding: 20px; 
            border-radius: 8px; 
            max-height: 650px; 
            overflow-y: auto;
            border: 2px solid #333;
            line-height: 1.1; 
            font-family: 'Courier New', monospace;
            font-size: 22px; 
            letter-spacing: 3px;
        }
        .line { white-space: nowrap; margin-bottom: 2px; }
        .target-digit { color: #000; font-weight: bold; background: #f0f0f0; padding: 0 3px; }
        
        /* Tô màu nền cho cụm Q */
        .q-bg-red { background-color: #ff4d4d !important; color: white !important; } /* Tô nền đỏ */
        .q-bg-blue { background-color: #00a8ff !important; color: white !important; } /* Tô nền xanh */
        .q-bg-yellow { background-color: #ffff00 !important; color: black !important; } /* Tô nền vàng */
        
        .status { color: #007bff; font-weight: bold; margin-bottom: 10px; }
        .legend { font-size: 14px; background: #fff; padding: 10px; border: 1px solid #ccc; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Hệ Thống Phân Tích Số Q</h2>
    <div class="legend">
        - <span style="background:#ff4d4d; color:white; padding:2px">Nền Đỏ</span>: Cả 6 số Q đều ≥ 5.<br>
        - <span style="background:#00a8ff; color:white; padding:2px">Nền Xanh</span>: Cả 6 số Q đều < 5.<br>
        - <span style="background:#ffff00; padding:2px">Nền Vàng</span>: Đối nghịch tuyệt đối với dòng trên/dưới.
    </div>
    
    <div class="input-group">
        <label>Chọn tệp (.txt):</label>
        <input type="file" id="fileInput" accept=".txt">
    </div>

    <div class="input-group">
        <label>Số bắt đầu (0-9):</label>
        <input type="number" id="targetNum" min="0" max="9" value="0">
    </div>

    <div class="btn-group">
        <button class="btn-run" onclick="processData()">PHÂN TÍCH</button>
        <button id="downBtn" class="btn-down" onclick="downloadTxt()">TẢI KẾT QUẢ</button>
    </div>
    <div id="fileStatus" class="status"></div>
    <div id="output">Kết quả hiển thị tại đây...</div>
</div>

<script>
    let finalRawText = "";
    const KEY = 'data_storage_v7';

    // Kiểm tra đối nghịch tuyệt đối 6 vị trí
    function isFullOpp(lA, lB) {
        if (!lA || !lB) return false;
        for (let p = 1; p <= 6; p++) {
            const nA = parseInt(lA[p]), nB = parseInt(lB[p]);
            if (!((nA >= 5 && nB < 5) || (nA < 5 && nB >= 5))) return false;
        }
        return true;
    }

    function processData() {
        const fileInput = document.getElementById('fileInput');
        if (fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result.replace(/[^0-9]/g, '');
                localStorage.setItem(KEY, content);
                execute(content);
            };
            reader.readAsText(fileInput.files[0]);
        } else {
            const saved = localStorage.getItem(KEY);
            if (saved) execute(saved);
            else alert("Vui lòng chọn file!");
        }
    }

    function execute(data) {
        const target = document.getElementById('targetNum').value.toString();
        const output = document.getElementById('output');
        let lines = [];
        let i = 0;

        while (i < data.length) {
            let start = data.indexOf(target, i);
            if (start === -1) break;
            let nextPos = data.indexOf(target, start + 7);
            if (nextPos !== -1) {
                lines.push(data.substring(start, nextPos));
                i = nextPos;
            } else {
                let last = data.substring(start);
                if (last.length >= 7) lines.push(last);
                break;
            }
        }

        output.innerHTML = "";
        finalRawText = lines.join('\n');

        for (let n = 0; n < lines.length; n++) {
            const cur = lines[n];
            const qSeq = cur.substring(1, 7);
            
            // Logic màu nền
            let bgClass = "";
            
            // Ưu tiên 1: Đối nghịch tuyệt đối (Vàng)
            if (isFullOpp(cur, lines[n+1]) || isFullOpp(cur, lines[n-1])) {
                bgClass = "q-bg-yellow";
            } 
            // Ưu tiên 2: Phân loại Đỏ/Xanh (Chỉ khi cả 6 số thỏa mãn)
            else {
                let allHigh = true;
                let allLow = true;
                for(let char of qSeq) {
                    if(parseInt(char) < 5) allHigh = false;
                    if(parseInt(char) >= 5) allLow = false;
                }
                if (allHigh) bgClass = "q-bg-red";
                else if (allLow) bgClass = "q-bg-blue";
            }

            const div = document.createElement('div');
            div.className = 'line';
            
            // Số đầu
            const s1 = document.createElement('span');
            s1.className = 'target-digit';
            s1.textContent = cur[0];
            div.appendChild(s1);

            // Cụm Q (Tô màu nền)
            const s2 = document.createElement('span');
            s2.textContent = qSeq;
            if (bgClass) s2.className = bgClass;
            div.appendChild(s2);

            // Số còn lại
            if (cur.length > 7) {
                const s3 = document.createElement('span');
                s3.textContent = cur.substring(7);
                div.appendChild(s3);
            }

            output.appendChild(div);
        }
        document.getElementById('downBtn').style.display = lines.length ? "block" : "none";
        document.getElementById('fileStatus').textContent = `Đã xử lý: ${lines.length} dòng.`;
    }

    function downloadTxt() {
        const blob = new Blob([finalRawText], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "ket_qua_phan_tich.txt";
        a.click();
    }
</script>

</body>
</html>
