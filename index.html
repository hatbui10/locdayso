\<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Làm file Json 2 const</title>

<style>
body{
  font-family: 'Segoe UI', Arial, sans-serif;
  background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
  color:#f5f5f5;
  padding:30px;
  min-height:100vh;
}

textarea{
  margin:20px auto;
  display:block;
   width:85%;
  height:260px;
  padding:15px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  color:#fff;
  font-size:15px;
  box-shadow: 0 0 15px rgba(0,255,255,0.15);
  transition: all 0.3s ease;
}

textarea:focus{
  outline:none;
  box-shadow: 0 0 25px rgba(0,255,255,0.6);
  border-color: #00ffff;
}

button{
  padding:12px 22px;
  font-weight:bold;
  cursor:pointer;
  margin-right:10px;
  border:none;
  border-radius:30px;
  background: linear-gradient(135deg,#00f5ff,#7b2ff7);
  color:#fff;
  letter-spacing:1px;
  transition: all 0.3s ease;
  box-shadow: 0 0 12px rgba(123,47,247,0.6);
}

button:hover{
  transform: translateY(-2px);
  box-shadow: 0 0 25px rgba(0,255,255,0.8);
}


h2{
  text-align:center;
  font-size:22px;
  letter-spacing:1px;
  margin-bottom:15px;
  color:#00f5ff;
  text-shadow: 0 0 12px rgba(0,255,255,0.6);
}


pre{
  background: rgba(255,255,255,0.05);
  padding:20px;
  border-radius:14px;
  overflow-x:auto;
  margin:20px auto;
   width:85%;
  white-space:pre;
  box-shadow: inset 0 0 20px rgba(0,255,255,0.15);
}

#stats{
  margin:20px auto;
   width:85%;

  font-weight:bold;
  line-height:1.8;
  padding:15px;
  border-radius:12px;
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 15px rgba(0,255,255,0.2);
}


.success{
  color:#00ffcc;
  margin-top:10px;
  font-weight:bold;
  text-shadow: 0 0 10px rgba(0,255,200,0.7);
}

.btn-group{
  display:flex;
  gap:15px;
  margin:25px auto;
  justify-content:center;
}


</style>
</head>
<body>

<h2>Dán JSON vào đây</h2>
<textarea id="input"></textarea>

<div class="btn-group">
  <button onclick="processData()">Chuẩn hóa</button>
  <button onclick="copyResult()">Copy kết quả</button>
</div>



<h2>Kết quả</h2>
<pre id="output"></pre>

<div id="stats"></div>
<div id="copyStatus" class="success"></div>

<script>

function extractNumbers(str){
  return str.match(/\d{3}/g) || [];
}

function groupAndFormat(arr){
  const groups = {};

  arr.forEach(num=>{
    const prefix = num[0];
    if(!groups[prefix]) groups[prefix] = [];
    groups[prefix].push(num);
  });

  let result = "";

  Object.keys(groups).sort().forEach(prefix=>{
    result += "    ";
    result += groups[prefix]
      .sort((a,b)=>Number(a)-Number(b))
      .map(n=>`"${n}"`)
      .join(",");
    result += ",\n\n";
  });

  return result.trim().replace(/,$/,"");
}

function processData(){

  const raw = document.getElementById("input").value;

  const dataMatch = raw.match(/"data"\s*:\s*\[(.*?)\]/s);
  const data2Match = raw.match(/"data2"\s*:\s*\[(.*?)\]/s);

  if(!dataMatch || !data2Match){
    document.getElementById("output").textContent = "Không tìm thấy data hoặc data2";
    document.getElementById("stats").textContent = "";
    return;
  }

  let data = [...new Set(extractNumbers(dataMatch[1]))];
  let data2 = [...new Set(extractNumbers(data2Match[1]))];

  // Loại trùng giữa 2 nhóm
  data2 = data2.filter(n => !data.includes(n));

  data.sort((a,b)=>Number(a)-Number(b));
  data2.sort((a,b)=>Number(a)-Number(b));

  const finalJson = `const data = {
  data: [

${groupAndFormat(data)}

  ],

  data2: [

${groupAndFormat(data2)}

  ]
};`;

  document.getElementById("output").textContent = finalJson;

  // Thống kê
  const totalData = data.length;
  const totalData2 = data2.length;
  const totalAll = totalData + totalData2;

  document.getElementById("stats").innerHTML = `
Tổng data: ${totalData} số<br>
Tổng data2: ${totalData2} số<br>
Tổng tất cả: ${totalAll} số
`;

  document.getElementById("copyStatus").textContent = "";
}

function copyResult(){
  const text = document.getElementById("output").textContent;

  if(!text){
    document.getElementById("copyStatus").textContent = "Không có gì để copy";
    return;
  }

  navigator.clipboard.writeText(text).then(()=>{
    document.getElementById("copyStatus").textContent = "Đã copy vào clipboard ✓";
  });
}

</script>

</body>
</html>
