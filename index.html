<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Lọc số từ file TXT</title>
<style>
body { font-family: sans-serif; padding: 20px; }
textarea { width: 100%; height: 300px; margin-top: 10px; }
</style>
</head>
<body>

<h2>Upload file TXT</h2>
<input type="file" id="fileInput">

<h3>Kết quả:</h3>
<textarea id="output"></textarea>

<script>
document.getElementById("fileInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(event) {
    const text = event.target.result;

    // Lấy tất cả chuỗi số (5 chữ số)
    const numbers = text.match(/\d+/g) || [];

    // Lọc số bắt đầu bằng 3
    const result = numbers.filter(num => num.startsWith("3"));

    document.getElementById("output").value = result.join(", ");
  };

  reader.readAsText(file);
});
</script>

</body>
</html>
