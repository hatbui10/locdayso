<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phân Tích Khối - Xuất Ảnh & PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 20px; 
            background: #000; 
            color: #c5c6c7; 
        }

        .box { 
            background: #111; 
            padding: 25px; 
            border-radius: 12px; 
            border: 1px solid #222;
        }

        h2 { color: #66fcf1; text-align: center; text-transform: uppercase; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        button { flex: 1; padding: 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; min-width: 150px; }
        
        .btn-run { background: #1f2833; color: #66fcf1; border: 1px solid #66fcf1; }
        .btn-run:hover { background: #66fcf1; color: #0b0b0b; }
        
        .btn-img { background: #ffc107; color: #000; display: none; } /* Nút chụp ảnh */
        .btn-down { background: #28a745; color: white; display: none; }
        
        #output { 
            margin-top: 20px; 
            background: #050505; 
            padding: 20px; 
            border-radius: 8px; 
            border: 1px solid #333;
            line-height: 1.2; 
            font-family: 'Courier New', monospace;
            font-size: 20px; 
            color: #00ff41; 
        }

        .block-header { 
            background: #1a1a1a; 
            color: #45a29e; 
            padding: 10px; 
            margin: 30px 0 10px 0; 
            font-size: 22px; 
            font-weight: bold;
            border-left: 4px solid #45a29e;
        }

        .line { white-space: nowrap; margin-bottom: 4px; border-bottom: 1px solid #111; }
        .target-digit { color: #0b0b0b; font-weight: bold; background: #c5c6c7; padding: 0 6px; border-radius: 2px; margin-right: 5px; }
        
        /* MÀU SẮC & GẠCH NGANG 0.2px */
        .q-bg-red { background-color: white !important; color: red !important; }
        .q-bg-blue { 
            background-color: #002b5c !important; 
            color: #ffffff !important; 
            text-decoration: line-through;
            text-decoration-color: #ffffff;
            text-decoration-thickness: 0.2px;
        }
        .q-bg-yellow { background-color: #b8860b !important; color: #000000 !important; font-weight: bold; }
        
        .status { color: #66fcf1; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Phân Tích Khối (Bản Xuất Ảnh)</h2>
    
    <input type="file" id="fileInput" accept=".txt" style="width: 100%; margin-bottom: 20px;">

    <div class="btn-group">
        <button class="btn-run" onclick="processData()">XỬ LÝ DỮ LIỆU</button>
        <button id="imgBtn" class="btn-img" onclick="exportImage()">CHỤP ẢNH KẾT QUẢ (.PNG)</button>
        <button id="downBtn" class="btn-down" onclick="downloadTxt()">XUẤT FILE (.TXT)</button>
    </div>

    <div id="fileStatus" class="status"></div>

    <div id="output">Sẵn sàng...</div>
</div>

<script>
    let finalRawText = "";
    const KEY = 'block_analysis_v9';

    function isFullOpp(lA, lB) {
        if (!lA || !lB) return false;
        for (let p = 1; p <= 6; p++) {
            const nA = parseInt(lA[p]), nB = parseInt(lB[p]);
            if (!((nA >= 5 && nB < 5) || (nA < 5 && nB >= 5))) return false;
        }
        return true;
    }

    function processData() {
        const fileInput = document.getElementById('fileInput');
        if (fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result.replace(/[^0-9]/g, '');
                localStorage.setItem(KEY, content);
                execute(content);
            };
            reader.readAsText(fileInput.files[0]);
        } else {
            const saved = localStorage.getItem(KEY);
            if (saved) execute(saved);
            else alert("Vui lòng chọn file!");
        }
    }

    function execute(data) {
        const output = document.getElementById('output');
        output.innerHTML = "";
        finalRawText = "";
        let totalLines = 0;

        for (let digit = 0; digit <= 9; digit++) {
            let target = digit.toString();
            let lines = [];
            let i = 0;

            while (i < data.length) {
                let start = data.indexOf(target, i);
                if (start === -1) break;
                let nextPos = data.indexOf(target, start + 7);
                if (nextPos !== -1) {
                    lines.push(data.substring(start, nextPos));
                    i = nextPos;
                } else {
                    let last = data.substring(start);
                    if (last.length >= 7) lines.push(last);
                    break;
                }
            }

            if (lines.length > 0) {
                totalLines += lines.length;
                const header = document.createElement('div');
                header.className = 'block-header';
                header.textContent = `KHỐI SỐ: ${target}`;
                output.appendChild(header);

                finalRawText += `--- KHỐI SỐ: ${target} ---\n` + lines.join('\n') + "\n\n";

                for (let n = 0; n < lines.length; n++) {
                    const cur = lines[n];
                    const qSeq = cur.substring(1, 7);
                    let bgClass = "";

                    if (isFullOpp(cur, lines[n+1]) || isFullOpp(cur, lines[n-1])) {
                        bgClass = "q-bg-yellow";
                    } else {
                        let allHigh = true, allLow = true;
                        for(let char of qSeq) {
                            if(parseInt(char) < 5) allHigh = false;
                            if(parseInt(char) >= 5) allLow = false;
                        }
                        if (allHigh) bgClass = "q-bg-red";
                        else if (allLow) bgClass = "q-bg-blue";
                    }

                    const div = document.createElement('div');
                    div.className = 'line';
                    div.innerHTML = `<span class="target-digit">${cur[0]}</span><span class="${bgClass}">${qSeq}</span>${cur.substring(7)}`;
                    output.appendChild(div);
                }
            }
        }
        document.getElementById('downBtn').style.display = totalLines ? "block" : "none";
        document.getElementById('imgBtn').style.display = totalLines ? "block" : "none";
        document.getElementById('fileStatus').textContent = `Đã xử lý xong.`;
    }

    // HÀM CHỤP ẢNH KẾT QUẢ
    function exportImage() {
        const target = document.getElementById('output');
        const status = document.getElementById('fileStatus');
        status.textContent = "Đang tạo ảnh, vui lòng chờ giây lát...";

        html2canvas(target, {
            backgroundColor: "#050505", // Giữ nền đen cho ảnh
            scale: 2, // Tăng độ nét gấp đôi
            logging: false,
            useCORS: true
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Phan-Tich-Khoi-${new Date().getTime()}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
            status.textContent = "Đã tải ảnh về!";
        });
    }

    function downloadTxt() {
        const blob = new Blob([finalRawText], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "ket_qua.txt";
        a.click();
    }
</script>

</body>
</html>
