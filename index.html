<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lọc số - Bản nâng cấp lọc trùng</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #0f172a;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  width: 95%;
  max-width: 500px;
  background: #111827;
  padding: 20px;
  border-radius: 20px;
}

input, button {
  width: 80%;
  margin: 10px auto 0;
  display: block;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

input {
  text-align: center;
  font-size: 22px;
  letter-spacing: 5px;
  background: #1f2937;
  color: #fff;
}

button {
  background: #6366f1;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
}

.output-box {
  width: 80%;
  height: 260px;
  margin: 15px auto 0;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #374151;
  background: #000;
  overflow-y: auto;
  font-family: monospace;
  white-space: pre-wrap;
  color: #ccc;
}

.highlight {
  color: #00ffcc;
  font-weight: bold;
  font-size: 1.3em;
}

.info-text {
  text-align: center;
  font-size: 0.9em;
  color: #94a3b8;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h2 style="text-align:center">🔢 Lọc số (Không trùng)</h2>

  <input type="file" id="fileInput" accept=".txt">

  <input type="tel"
         id="filterInput"
         placeholder="Nhập 2 số"
         maxlength="2">

  <button onclick="processFile()">🔍 Lọc & Loại trùng</button>
  <button onclick="copyResult()">📋 Copy</button>
  <button onclick="downloadFile()">⬇️ Xuất file</button>

  <div id="status" class="info-text">Chưa có dữ liệu</div>
  <div id="output" class="output-box">Kết quả sẽ hiện ở đây...</div>
</div>

<script>
let uniqueNumbers = []; // Mảng chứa các số duy nhất
let finalText = "";

// 1. Đọc file và xử lý lọc trùng ngay khi nạp
document.getElementById("fileInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(event) {
    const text = event.target.result;

    // Tách các chuỗi có 10 ký tự
    const allNumbers = text.split(/\s+/).filter(s => s.length === 10);
    
    // LOẠI BỎ TRÙNG LẶP bằng Set
    uniqueNumbers = [...new Set(allNumbers)];

    document.getElementById("status").innerText = `Đã nạp ${uniqueNumbers.length} số (đã lọc trùng)`;
    
    const input = document.getElementById("filterInput");
    input.focus();
  };
  reader.readAsText(file);
});

// 2. Hàm xử lý lọc theo 2 số đã nhập
function processFile() {
  const keyword = document.getElementById("filterInput").value;
  const output = document.getElementById("output");

  if (keyword.length !== 2) {
    alert("Nhập đủ 2 số để lọc nhé! 😐");
    return;
  }

  let htmlResult = "";
  let textResult = "";
  let count = 0;

  // Lọc từ mảng uniqueNumbers đã sạch
  uniqueNumbers.forEach(num => {
    if (num.includes(keyword)) {
      // Highlight số khớp
      const highlighted = num.replace(
        new RegExp(keyword, "g"),
        `<span class="highlight">${keyword}</span>`
      );

      htmlResult += highlighted + "\n";
      textResult += num + "\n";
      count++;
    }
  });

  finalText = textResult.trim(); // Xóa khoảng trắng thừa cuối file
  output.innerHTML = htmlResult || "Không tìm thấy kết quả phù hợp.";
  document.getElementById("status").innerText = `Tìm thấy ${count} số khớp với "${keyword}"`;
}

// 3. Hàm Copy
function copyResult() {
  if (!finalText) {
    alert("Chưa có kết quả để copy!");
    return;
  }
  navigator.clipboard.writeText(finalText).then(() => {
    alert("Đã copy danh sách sạch! 😎");
  });
}

// 4. Hàm Xuất File
function downloadFile() {
  if (!finalText) {
    alert("Dữ liệu trống, không thể xuất file!");
    return;
  }
  const blob = new Blob([finalText], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ketqua_da_loc_trung.txt";
  a.click();
}
</script>

</body>
</html>
