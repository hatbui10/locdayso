<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyzer v26.0 - Full Stats</title>
    <style>
        :root {
            --bg-body: #0a0a0a;
            --bg-container: #161616;
            --text-main: #e0e0e0;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --surface: #222222;
            --success: #4caf50;
            --warning: #ff9800;
            --blue-light: #03a9f4;
        }

        body { font-family: 'Consolas', monospace; padding: 10px; background: var(--bg-body); color: var(--text-main); margin: 0; }
        .container { max-width: 500px; margin: auto; background: var(--bg-container); padding: 15px; border-radius: 12px; border: 1px solid #333; }
        
        /* HÀNG 1: FILE */
        .row-file {
            background: var(--surface); padding: 10px; border-radius: 8px; 
            margin-bottom: 10px; border: 1px solid #444; display: flex; justify-content: space-between; align-items: center;
        }

        /* HÀNG 2: MM & Ab */
        .row-display {
            background: #000; padding: 12px; border-radius: 8px;
            margin-bottom: 10px; border: 1px solid #444; display: flex; justify-content: space-evenly;
        }
        .display-item { text-align: center; }
        .display-item label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 5px; }
        .val-box { color: var(--secondary); font-size: 1.8rem; font-weight: bold; }

        /* HÀNG 3: BOX THỐNG KÊ & NHẬP N */
        .row-action {
            display: flex; gap: 10px; margin-bottom: 10px; height: 80px;
        }
        
        .box-stats {
            flex: 2; background: #1a1a1a; border: 1px solid #444; border-radius: 8px;
            padding: 10px 15px; display: flex; flex-direction: column; justify-content: center;
        }
        .stat-line { font-weight: bold; font-size: 1rem; display: flex; justify-content: space-between; }
        .c-yellow { color: var(--warning); }
        .c-blue { color: var(--blue-light); }

        .box-n {
            flex: 1; background: var(--surface); border: 2px solid var(--primary); border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .box-n label { font-size: 0.65rem; color: var(--primary); font-weight: bold; margin-bottom: 2px; }
        input.n-input {
            background: transparent; border: none; color: #fff; width: 100%; 
            text-align: center; font-size: 2.2rem; font-weight: bold; outline: none;
        }

        /* KẾT QUẢ */
        #extractedText {
            width: 100%; height: 350px; background: #000; color: var(--secondary);
            border: 1px solid #444; border-radius: 8px; padding: 10px;
            font-size: 1.2rem; resize: none; line-height: 1.4; box-sizing: border-box;
        }

        .copy-btn { background: var(--success); color: white; width: 100%; margin-top: 10px; padding: 12px; font-size: 1rem; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .clear-btn { background: #444; color: #aaa; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        
        /* FOOTER STATS (PHẦN BẠN CẦN) */
        .footer-stats {
            margin-top: 15px; padding-top: 10px; border-top: 1px dashed #333;
            display: flex; justify-content: space-between; font-size: 0.75rem; color: #666;
        }
        .footer-stats b { color: #888; }
    </style>
</head>
<body>

<div class="container">
    <div class="row-file">
        <input type="file" id="fileInput" accept=".txt" style="width: 70%; font-size: 0.75rem;">
        <button class="clear-btn" onclick="clearData()">Xóa nhớ</button>
    </div>

    <div class="row-display">
        <div class="display-item">
            <label>Mặt MM</label>
            <div id="mmVal" class="val-box">--</div>
        </div>
        <div style="width:1px; background:#333; margin: 10px 0;"></div>
        <div class="display-item">
            <label>Mặt Ab</label>
            <div id="abVal" class="val-box">--</div>
        </div>
    </div>

    <div class="row-action">
        <div class="box-stats">
            <div class="stat-line c-yellow">
                <span>🟡 Dãy Lớn:</span> <span id="countYellow">0</span>
            </div>
            <div class="stat-line c-blue" style="margin-top: 5px;">
                <span>🔵 Dãy Nhỏ:</span> <span id="countBlue">0</span>
            </div>
        </div>
        <div class="box-n">
            <label>NHẬP N</label>
            <input type="tel" id="inputN" class="n-input" placeholder="?" maxlength="1" inputmode="numeric" autocomplete="off">
        </div>
    </div>
    
    <textarea id="extractedText" readonly placeholder="Kết quả..."></textarea>
    
    <button class="copy-btn" onclick="copyExtracted()">SAO CHÉP KẾT QUẢ</button>

    <div class="footer-stats">
        <span>Dữ liệu file: <b id="totalCount">0</b> số</span>
        <span>Mẫu 9 số: <b id="groupCount">0</b></span>
    </div>
</div>

<script>
    const STORAGE_KEY = 'sequence_analyzer_data';
    let rawData = "";
    let currentNumbers = []; 

    const nInput = document.getElementById('inputN');
    const mmBox = document.getElementById('mmVal');
    const abBox = document.getElementById('abVal');

    window.onload = () => {
        const savedData = localStorage.getItem(STORAGE_KEY);
        if (savedData) {
            rawData = savedData;
            processFileStats(rawData); // Tính toán thống kê file khi load trang
        }
        nInput.focus();
        document.addEventListener('click', () => nInput.focus());
    };

    nInput.addEventListener('input', function() {
        const val = this.value.trim();
        if (val !== "" && !isNaN(val)) {
            currentNumbers.push(val);
            if (currentNumbers.length > 4) currentNumbers.shift();
            updateDisplay();
            if (currentNumbers.length === 4) extractSequences();
        }
        this.value = "";
    });

    function updateDisplay() {
        let m1 = currentNumbers[currentNumbers.length - 4] || "";
        let m2 = currentNumbers[currentNumbers.length - 3] || "";
        let a1 = currentNumbers[currentNumbers.length - 2] || "";
        let a2 = currentNumbers[currentNumbers.length - 1] || "";
        mmBox.innerText = (m1 + m2) || "--";
        abBox.innerText = (a1 + a2) || "--";
    }

    document.getElementById('fileInput').addEventListener('change', async function(e) {
        const file = e.target.files[0];
        if (!file) return;
        rawData = await file.text();
        localStorage.setItem(STORAGE_KEY, rawData);
        processFileStats(rawData); // Cập nhật thống kê khi up file mới
        currentNumbers = [];
        updateDisplay();
        nInput.focus();
    });

    function processFileStats(content) {
        const nums = content.replace(/\D/g, '').split('').map(Number);
        if (nums.length === 0) return;
        
        let groupCount = 0;
        const isA = (n) => n >= 5, isB = (n) => n < 5;
        
        for (let i = 0; i <= nums.length - 9; i++) {
            let match = false;
            if (isA(nums[i]) && isA(nums[i+1]) && isB(nums[i+2]) && isB(nums[i+3]) && isA(nums[i+4]) && isB(nums[i+5]) && isA(nums[i+6]) && isB(nums[i+7]) && isA(nums[i+8])) match = true;
            else if (isB(nums[i]) && isA(nums[i+1]) && isB(nums[i+2]) && isA(nums[i+3]) && isB(nums[i+4]) && isA(nums[i+5]) && isB(nums[i+6]) && isA(nums[i+7]) && isB(nums[i+8])) match = true;
            else if (isA(nums[i]) && isB(nums[i+1]) && isA(nums[i+2]) && isB(nums[i+3]) && isA(nums[i+4]) && isB(nums[i+5]) && isA(nums[i+6]) && isB(nums[i+7]) && isA(nums[i+8])) match = true;
            else if (isB(nums[i]) && isB(nums[i+1]) && isA(nums[i+2]) && isA(nums[i+3]) && isB(nums[i+4]) && isA(nums[i+5]) && isB(nums[i+6]) && isA(nums[i+7]) && isB(nums[i+8])) match = true;
            if (match) { groupCount++; i += 8; }
        }
        
        document.getElementById('totalCount').innerText = nums.length.toLocaleString();
        document.getElementById('groupCount').innerText = groupCount.toLocaleString();
    }

    function extractSequences() {
        const mm = mmBox.innerText;
        const ab = abBox.innerText;
        const textArea = document.getElementById('extractedText');
        if (mm === "--" || ab === "--") return;

        const nums = rawData.replace(/\D/g, '').split('').map(Number);
        let blocks = { AA: [], AB: [], BB: [], BA: [] };
        const isA = (n) => n >= 5;
        const isB = (n) => n < 5;

        for (let i = 0; i <= nums.length - 8; i++) {
            if (nums[i] === parseInt(mm[0]) && nums[i+1] === parseInt(mm[1])) {
                let d = nums.slice(i, i + 8);
                let lastFour = d.slice(4);
                let colorTag = "⚪ ";
                if (lastFour.every(n => isA(n))) colorTag = "🟡 ";
                else if (lastFour.every(n => isB(n))) colorTag = "🔵 ";

                let formatted = `${colorTag}${d[0]}${d[1]}-${d[2]}${d[3]}-${d[4]}${d[5]} ${d[6]}${d[7]}`;
                if (isA(d[2]) && isA(d[3])) blocks.AA.push(formatted);
                else if (isA(d[2]) && isB(d[3])) blocks.AB.push(formatted);
                else if (isB(d[2]) && isB(d[3])) blocks.BB.push(formatted);
                else if (isB(d[2]) && isA(d[3])) blocks.BA.push(formatted);
            }
        }

        const n2 = parseInt(ab[0]), n3 = parseInt(ab[1]);
        let target = (isA(n2) && isA(n3)) ? "AA" : (isA(n2) && isB(n3)) ? "AB" : (isB(n2) && isB(n3)) ? "BB" : "BA";
        
        textArea.value = blocks[target].length > 0 
            ? `[ KHỐI ${target} ] (MM:${mm} Ab:${ab})\n` + blocks[target].join('\n') 
            : `KHÔNG CÓ DỮ LIỆU KHỐI ${target}`;

        document.getElementById('countYellow').innerText = (textArea.value.match(/🟡/g) || []).length;
        document.getElementById('countBlue').innerText = (textArea.value.match(/🔵/g) || []).length;
    }

    function copyExtracted() {
        const textArea = document.getElementById('extractedText');
        if (!textArea.value) return;
        textArea.select();
        document.execCommand('copy');
        alert("Đã copy!");
    }

    function clearData() {
        if(confirm("Xóa bộ nhớ?")) {
            localStorage.clear();
            location.reload();
        }
    }
</script>
</body>
</html>
